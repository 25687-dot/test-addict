<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; font-family: 'ChulaCharasNew', sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h3 class="text-center mb-4 text-primary">ฟอร์มเก็บข้อมูลนักเรียนลง Google Sheets</h3>
            
            <form id="studentForm" onsubmit="submitForm(event)">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">เลขประจำตัวนักเรียน (5 หลัก)</label>
                        <input type="text" class="form-control" id="studentId" pattern="\d{5}" maxlength="5" required placeholder="เช่น 12345">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">คำนำหน้าชื่อ</label>
                        <select class="form-select" id="prefix" required>
                            <option value="" disabled selected>เลือกคำนำหน้า</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">ชื่อ</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">นามสกุล</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">ชั้นมัธยมศึกษาปีที่ (ม.)</label>
                        <select class="form-select" id="grade" required>
                            <option value="" disabled selected>เลือกชั้นปี</option>
                            <option value="1">ม.1</option>
                            <option value="2">ม.2</option>
                            <option value="3">ม.3</option>
                            <option value="4">ม.4</option>
                            <option value="5">ม.5</option>
                            <option value="6">ม.6</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">ห้อง</label>
                        <input type="number" class="form-control" id="room" min="1" required placeholder="เช่น 1">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">เลขที่</label>
                        <input type="number" class="form-control" id="no" min="1" required placeholder="เช่น 1">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">น้ำหนัก (ก.ก.)</label>
                        <input type="number" step="0.1" class="form-control" id="weight" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">ส่วนสูง (ซ.ม.)</label>
                        <input type="number" step="0.1" class="form-control" id="height" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>
</div>

<script>
    // URL ของ Google Apps Script Web App ที่ได้จากผู้ใช้
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoKJMd93RfcD4OnYEYLJmNSm60ILkwdsplpukko9CBv8UbrX4b2DESdA8Wmoi42cIhfw/exec";

    function submitForm(event) {
        event.preventDefault(); // ป้องกันการโหลดหน้าใหม่ของฟอร์มตามปกติ

        // แสดง SweetAlert2 แจ้งสถานะกำลังบันทึกข้อมูล (ปิดปุ่มกด และห้ามคลิกนอกหน้าต่าง)
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            text: 'โปรดรอสักครู่ ระบบกำลังส่งข้อมูลไปยัง Google Sheets',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // ดึงค่าจากฟอร์มสร้างเป็น Query Parameters เพื่อส่งแบบ JSONP
        const studentId = document.getElementById('studentId').value;
        const prefix = document.getElementById('prefix').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const grade = document.getElementById('grade').value;
        const room = document.getElementById('room').value;
        const no = document.getElementById('no').value;
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;

        // ฟังก์ชัน Callback ชื่อสุ่ม/ไม่ซ้ำกัน เพื่อรองรับหลักการของ JSONP
        const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());

        // สร้าง Query String เพื่อต่อท้าย URL
        const queryString = `?callback=${callbackName}`
            + `&studentId=${encodeURIComponent(studentId)}`
            + `&prefix=${encodeURIComponent(prefix)}`
            + `&firstName=${encodeURIComponent(firstName)}`
            + `&lastName=${encodeURIComponent(lastName)}`
            + `&grade=${encodeURIComponent(grade)}`
            + `&room=${encodeURIComponent(room)}`
            + `&no=${encodeURIComponent(no)}`
            + `&weight=${encodeURIComponent(weight)}`
            + `&height=${encodeURIComponent(height)}`;

        // ประกาศฟังก์ชัน Callback รอไว้ในระดับ Window เพื่อให้ฝั่ง Apps Script เรียกกลับมาทำงานได้
        window[callbackName] = function(response) {
            if (response.result === 'success') {
                // แสดงสถานะบันทึกสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: 'ข้อมูลนักเรียนถูกบันทึกลง Google Sheets เรียบร้อยแล้ว',
                    confirmButtonText: 'ตกลง'
                });
                document.getElementById('studentForm').reset(); // เคลียร์ฟอร์มหลังบันทึกเสร็จ
            } else {
                // กรณีเกิดข้อผิดพลาดจากฝั่ง Server
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด!',
                    text: 'ไม่สามารถบันทึกข้อมูลได้: ' + response.message,
                });
            }
            // ลบแท็ก <script> และฟังก์ชันที่สร้างขึ้นชั่วคราวออกเพื่อประหยัดหน่วยความจำ
            document.body.removeChild(scriptElement);
            delete window[callbackName];
        };

        // ทำการสร้างแท็ก <script> เพื่อยิงคำขอไปยัง Apps Script (หัวใจหลักของเทคนิค JSONP เพื่อเลี่ยง CORS)
        const scriptElement = document.createElement('script');
        scriptElement.src = SCRIPT_URL + queryString;
        
        // จัดการกรณีที่โหลด Script ล้มเหลว (เช่น เน็ตหลุด หรือ URL ผิด)
        scriptElement.onerror = function() {
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว!',
                text: 'ไม่สามารถติดต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
            });
            document.body.removeChild(scriptElement);
            delete window[callbackName];
        };

        // ฝังแท็ก script เข้าไปใน body เพื่อให้เบราว์เซอร์เริ่มรันทันที
        document.body.appendChild(scriptElement);
    }
</script>

</body>
</html>
